stages:
  fetch_raw:
    cmd: python -m src.data.download_galaxy_zoo
    deps:
      - src/data/download_galaxy_zoo.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/io_utils.py
      - src/common/postgres.py
      - config.yaml
    outs:
      - data/raw/galaxy_dataset

  preprocess_v1:
    cmd: python -m src.data.preprocess_v1
    deps:
      - src/data/preprocess_v1.py
      - src/data/validate.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/io_utils.py
      - src/common/postgres.py
      - config.yaml
      - data/raw/galaxy_dataset
    outs:
      - data/processed/v1

  preprocess_final:
    cmd: python -m src.data.preprocess_final
    deps:
      - src/data/preprocess_final.py
      - src/data/validate.py
      - src/features/baseline.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/io_utils.py
      - src/common/postgres.py
      - config.yaml
      - data/processed/v1
    outs:
      - data/processed/final
      - artifacts/data_manifest.csv
      - artifacts/drift_baseline.json

  train:
    cmd: python -m src.training.train
    deps:
      - src/training/train.py
      - src/training/model_def.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/io_utils.py
      - src/common/postgres.py
      - config.yaml
      - data/processed/final
      - data/feedback/training_feedback
      - artifacts/feedback_training_manifest.csv
    outs:
      - models/latest
    plots:
      - artifacts/confusion_matrix.csv

  evaluate:
    cmd: python -m src.training.evaluate
    deps:
      - src/training/evaluate.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/io_utils.py
      - src/common/postgres.py
      - config.yaml
      - models/latest
      - data/processed/final/test
    always_changed: true

  report:
    cmd: python -m src.reporting.generate_report
    deps:
      - src/reporting/generate_report.py
      - src/training/evaluate.py
      - src/common/artifact_store.py
      - src/common/config.py
      - src/common/postgres.py
      - config.yaml
      - models/latest
    always_changed: true
    outs:
      - artifacts/reports/latest_report.md
      - artifacts/reports/latest_report.html
