
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api

  - job_name: model-service
    metrics_path: /metrics
    static_configs:
      - targets: ['model-service:8001']
        labels:
          service: model-service

  - job_name: pipeline-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ['pipeline-exporter:8010']
        labels:
          service: pipeline-exporter

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          service: prometheus
