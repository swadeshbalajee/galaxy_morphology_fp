name: galaxy-mlops

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__FAB__AUTH_BACKENDS: airflow.providers.fab.auth_manager.api.auth.backend.session
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    APP_CONFIG_PATH: /opt/airflow/project/config.yaml
    PROJECT_ROOT: /opt/airflow/project
    PYTHONPATH: /opt/airflow/project
    TRAINING_PYTHON: /opt/venvs/training/bin/python
    DATABASE_URL: postgresql://galaxy:galaxy@postgres:5432/galaxy_app
    MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
    MLFLOW_TRACKING_URI: http://mlflow:5000
    _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
    _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    _PIP_ADDITIONAL_REQUIREMENTS: ''
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
    - ./:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    env_file: [.env]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports: ["5432:5432"]
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    ports: ["8081:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.2-bookworm
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        airflow db migrate
        airflow users create \
          --role Admin \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Airflow \
          --lastname Admin \
          --email admin@example.com || \
        airflow users reset-password \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}"
    restart: on-failure

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

  trainer:
    build:
      context: .
      dockerfile: trainer.Dockerfile
    env_file: [.env]
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql://galaxy:galaxy@postgres:5432/galaxy_app
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    working_dir: /app
    volumes:
      - ./:/app
      - mlruns:/app/mlruns
    command: ["bash", "-lc", "sleep infinity"]
    depends_on:
      mlflow: {condition: service_started}
      postgres: {condition: service_healthy}
    restart: unless-stopped

  pipeline-exporter:
    build:
      context: .
      dockerfile: model_service/Dockerfile
    env_file: [.env]
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql://galaxy:galaxy@postgres:5432/galaxy_app
    working_dir: /app
    volumes:
      - ./:/app
    command: ["uvicorn", "src.monitoring.pipeline_exporter:app", "--host", "0.0.0.0", "--port", "8010"]
    ports: ["8010:8010"]
    restart: unless-stopped

  model-service:
    build:
      context: .
      dockerfile: model_service/Dockerfile
    env_file: [.env]
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/galaxy_morphology_classifier@champion
    working_dir: /app
    volumes:
      - ./:/app
      - ./models:/app/models
    command: ["uvicorn", "model_service.app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: [.env]
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      DATABASE_URL: postgresql://galaxy:galaxy@postgres:5432/galaxy_app
    working_dir: /app
    volumes:
      - ./:/app
    command: ["uvicorn", "api.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]
    depends_on:
      model-service: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: [.env]
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/galaxy_morphology_classifier@champion
    working_dir: /app
    volumes:
      - ./:/app
    command: ["streamlit", "run", "frontend/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports: ["8501:8501"]
    depends_on:
      api: {condition: service_healthy}
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: mlflow_server/Dockerfile
    env_file: [.env]
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_SERVER_ALLOWED_HOSTS: ${MLFLOW_SERVER_ALLOWED_HOSTS:-mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000}
    working_dir: /mlflow
    volumes:
      - ./mlflow_server:/mlflow
      - mlruns:/mlflow/mlruns
    command:
      [
        "mlflow", "server",
        "--host", "0.0.0.0",
        "--port", "5000",
        "--backend-store-uri", "postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow",
        "--artifacts-destination", "/mlflow/mlruns",
        "--serve-artifacts"
      ]
    ports: ["5000:5000"]
    depends_on:
      postgres: {condition: service_healthy}
    restart: unless-stopped
    
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]
    depends_on:
      alertmanager: {condition: service_started}
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    env_file: [.env]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports: ["9093:9093"]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports: ["3100:3100"]
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./:/workspace
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports: ["3000:3000"]
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres-db-volume:
  mlruns:
  loki-data:
  alertmanager-data:
