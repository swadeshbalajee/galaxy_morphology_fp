
name: galaxy-mlops-ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements/api.txt
          pip install -r requirements/airflow.txt
          pip install scikit-learn==1.5.2

      - name: Compile source
        run: python -m compileall src api/app model_service/app frontend tests airflow/dags

      - name: Run unit tests
        run: pytest tests -q
